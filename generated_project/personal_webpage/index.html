<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Portfolio</title>
    <meta name="description" content="Personal portfolio showcasing my work, background, and ways to get in touch.">
    <!-- Open Graph / Facebook -->
    <meta property="og:title" content="My Personal Portfolio" />
    <meta property="og:description" content="Explore my projects, learn about my background, and contact me." />
    <meta property="og:image" content="assets/og-image.jpg" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:type" content="website" />
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<body>
    <!-- Hero Section -->
    <header id="hero" role="banner">
        <img src="assets/profile.jpg" alt="Profile picture" class="profile-photo">
        <h1>Creative Developer &amp; Designer</h1>
    </header>

    <!-- Navigation -->
    <nav id="nav" role="navigation" aria-label="Main navigation">
        <a href="#about">About</a>
        <a href="#portfolio">Portfolio</a>
        <a href="#contact">Contact</a>
    </nav>

    <!-- About Section -->
    <section id="about" role="region" aria-labelledby="about-heading">
        <h2 id="about-heading">About Me</h2>
        <p>Hello! I'm a passionate developer with a love for creating beautiful, functional web experiences. With a background in design and front‑end engineering, I enjoy turning ideas into reality.</p>
    </section>

    <!-- Portfolio Section -->
    <section id="portfolio" role="region" aria-labelledby="portfolio-heading">
        <h2 id="portfolio-heading">Portfolio</h2>
        <div class="grid">
            <!-- Portfolio items will be injected here -->
        </div>
    </section>

    <!-- Contact Section -->
    <section id="contact" role="region" aria-labelledby="contact-heading">
        <h2 id="contact-heading">Contact</h2>
        <p>Email: <a href="mailto:you@example.com">you@example.com</a></p>
        <div class="social-links">
            <a href="https://twitter.com/yourprofile" class="social-icon" aria-label="Twitter">
                <img src="assets/twitter.svg" alt="Twitter icon">
            </a>
            <a href="https://github.com/yourprofile" class="social-icon" aria-label="GitHub">
                <img src="assets/github.svg" alt="GitHub icon">
            </a>
            <a href="https://linkedin.com/in/yourprofile" class="social-icon" aria-label="LinkedIn">
                <img src="assets/linkedin.svg" alt="LinkedIn icon">
            </a>
        </div>
    </section>

    <!-- Footer -->
    <footer role="contentinfo">
        <button id="theme-toggle" aria-label="Toggle light/dark theme">🌙</button>
    </footer>

    <script src="script.js" defer></script>
</body>
</html>

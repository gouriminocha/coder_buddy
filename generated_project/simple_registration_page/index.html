<!-- Simple registration page with a form for user sign-up -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Registration Page</title>
</head>
<body>
    <div style="max-width:400px;margin:auto;padding:20px;border:1px solid #ccc;">
        <!-- Registration form will be inserted here -->
        <form method="post" action="#">
            <label for="fullName">Full Name</label>
            <input type="text" id="fullName" name="fullName" required style="width:100%;margin-bottom:10px;">
            <!-- Input fields will be added here in subsequent tasks -->
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required minlength="8" style="width:100%;margin-bottom:10px;">
            <button type="submit" style="width:100%;padding:10px;background:#4CAF50;color:white;border:none;cursor:pointer;">Register</button>
        </form>
    </div>
</body>
</html>
